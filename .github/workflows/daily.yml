name: Career Pulse

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - run: python main.py

      - uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: daily_report.md
